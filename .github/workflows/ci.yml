name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint with py_compile
        run: |
          python -m py_compile src/config.py
          python -m py_compile src/log_utils.py
          python -m py_compile src/cache_utils.py
          python -m py_compile src/data_agent.py
          python -m py_compile src/analyzer_agent.py
          python -m py_compile src/forecaster_agent.py
          python -m py_compile src/visualizer_agent.py
          python -m py_compile src/pdf_gen_agent.py
          python -m py_compile src/orchestrator_agent.py

      - name: Run unit tests
        env:
          ANTHROPIC_API_KEY: "sk-fake-for-ci"
        run: |
          python -m pytest tests/ -v --tb=short
